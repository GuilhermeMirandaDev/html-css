<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Wild' ;
            src: url('fonts/Wild\ Love.otf') format('opentype'), url('fonts/Wild\ Love.ttf') format('trutype');
            font-weight: normal;
            font-style: normal;
        }
            /*
                Tipos de format
                -opentype (otf)
                -trutype (ttf)
                -embedded-opentype
                -truetype-aat (Apple Advanced Typography)
                -svg
            */

       
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Wild', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Reiciendis quibusdam accusamus fuga doloribus consequatur culpa facilis quisquam quaerat ad eligendi voluptatum debitis possimus reprehenderit, temporibus laudantium blanditiis. Modi, eligendi qui.</p>
</body>
</html>
